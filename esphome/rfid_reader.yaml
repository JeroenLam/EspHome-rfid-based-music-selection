esphome:
  name: esphome-web-f8addc
  friendly_name: RFID test board
  min_version: 2025.11.0
  name_add_mac_suffix: false

substitutions:
  # SPI
  clk_pin:  GPIO18 # SCK
  mosi_pin: GPIO23 # MOSI
  miso_pin: GPIO19 # MISO
  cs_pin:   GPIO05 # SDA
  rst_pin:  GPIO22 # RST

esp32:
  variant: esp32
  framework:
    type: esp-idf

# Enable logging
logger:
  level: DEBUG

# Enable Home Assistant API
api:

# Allow Over-The-Air updates
ota:
- platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

spi:
  clk_pin: ${clk_pin}
  mosi_pin: ${mosi_pin}
  miso_pin: ${miso_pin}
  id: spi_bus1


rc522_spi:
  cs_pin: ${cs_pin}
  reset_pin: ${rst_pin}
  update_interval: 1s
  data_rate: 500kHz
  spi_id: spi_bus1
  on_tag:
    then:
      - homeassistant.tag_scanned: !lambda 'return x;'
      - logger.log:  
          format: "Tag scanned: %s"  
          args: [ 'x.c_str()' ]
  on_tag_removed:
    then:
      - homeassistant.tag_scanned: !lambda 'return "_" + x;'
      - logger.log:  
          format: "Tag removed: _%s"  
          args: [ 'x.c_str()' ]