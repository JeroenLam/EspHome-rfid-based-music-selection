esphome:
  name: esphome-web-6ab357
  friendly_name: RFID Music selector
  min_version: 2025.11.0
  name_add_mac_suffix: false

substitutions:
  device_name: rfit_music_woonkamer

  # SPI
  clk_pin:  GPIO14 # SCK
  mosi_pin: GPIO13 # MOSI
  miso_pin: GPIO12 # MISO
  cs_pin:   GPIO15 # SDA
  rst_pin:  GPIO16 # RST

  # Media Controls (Other pins to ground)
  but_l_pin: GPIO4
  but_m_pin: GPIO0
  but_r_pin: GPIO2

esp8266:
  board: esp01_1m

# Enable logging
logger:
  level: DEBUG

# Enable Home Assistant API
api:

# Allow Over-The-Air updates
ota:
- platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

spi:
  clk_pin: ${clk_pin}
  mosi_pin: ${mosi_pin}
  miso_pin: ${miso_pin}
  id: spi_bus1


rc522_spi:
  cs_pin: ${cs_pin}
  reset_pin: ${rst_pin}
  update_interval: 1s
  data_rate: 500kHz
  spi_id: spi_bus1
  on_tag:
    then:
      - homeassistant.tag_scanned: !lambda 'return x;'
      - logger.log:  
          format: "Tag scanned: %s"  
          args: [ 'x.c_str()' ]
  on_tag_removed:
    then:
      - homeassistant.tag_scanned: !lambda 'return "_" + x;'
      - logger.log:  
          format: "Tag removed: _%s"  
          args: [ 'x.c_str()' ]

script:
  - id: send_button_event
    parameters:
      button: string
      action: string
    then:
      - homeassistant.event:
          event: esphome.rfid_media_button
          data:
            device: ${device_name}
            button: !lambda 'return button;'
            action: !lambda 'return action;'


binary_sensor:
  - platform: gpio
    id: left_button
    pin:
      number: ${but_l_pin}
      inverted: true
      mode: INPUT_PULLUP
    name: "Left button"

    on_multi_click:

      # Short press
      - timing:
          - ON for at most 500ms
          - OFF for at least 50ms
        then:
          - script.execute:
              id: send_button_event
              button: "left"
              action: "previous"

      # Long press with volume ramp
      - timing:
          - ON for at least 600ms
        then:
          - while:
              condition:
                binary_sensor.is_on: left_button
              then:
                - script.execute:
                    id: send_button_event
                    button: "left"
                    action: "volume_down"
                - delay: 250ms

  - platform: gpio
    pin:
      number: ${but_m_pin}
      inverted: true
      mode: INPUT_PULLUP
    name: "Middle button"

    on_press:
      - script.execute:
          id: send_button_event
          button: "middle"
          action: "play_pause"

  - platform: gpio
    id: right_button
    pin:
      number: ${but_r_pin}
      inverted: true
      mode: INPUT_PULLUP
    name: "Right button"

    on_multi_click:

      - timing:
          - ON for at most 500ms
          - OFF for at least 50ms
        then:
          - script.execute:
              id: send_button_event
              button: "right"
              action: "next"

      - timing:
          - ON for at least 600ms
        then:
          - while:
              condition:
                binary_sensor.is_on: right_button
              then:
                - script.execute:
                    id: send_button_event
                    button: "right"
                    action: "volume_up"
                - delay: 250ms